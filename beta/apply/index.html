<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Apply for Beta | StreamSuites Developer Console</title>
  <link rel="icon" href="/assets/logos/favicon.ico" />
  <link rel="stylesheet" href="/css/app.css" />
</head>
<body>
  <header class="topbar">
    <div class="shell topbar-inner">
      <a class="brand" href="/">
        <img src="/assets/logos/logocircle.png" alt="StreamSuites" />
        <div class="brand-copy">
          <span class="brand-mark">StreamSuites</span>
          <span class="brand-sub">Developer Console</span>
        </div>
      </a>
      <div class="standalone-actions">
        <a class="header-link" href="/dashboard/">Back to dashboard</a>
        <span data-auth-slot></span>
      </div>
    </div>
  </header>
  <main class="shell page-shell">
    <section class="page-intro">
      <span class="eyebrow"><strong>Standalone route</strong> beta application</span>
      <h1>Apply for StreamSuites beta</h1>
      <p class="muted">The strongest applications usually come from people who understand creator workflows, software testing, and the value of precise reporting.</p>
    </section>
    <section class="main-stack">
      <article class="form-card">
        <form id="beta-apply-form" class="form-grid">
          <label class="field"><span>Name</span><input name="contact_name" maxlength="160" required /></label>
          <label class="field"><span>Email</span><input name="contact_email" type="email" maxlength="320" required /></label>
          <label class="field"><span>Timezone</span><input name="timezone" maxlength="80" placeholder="Optional" /></label>
          <label class="field"><span>Primary platforms / devices</span><input name="platforms" maxlength="400" placeholder="Windows, macOS, Chrome, OBS, iPhone..." /></label>
          <label class="field-wide"><span>Why do you want in?</span><textarea name="beta_motivation" required placeholder="Tell us what you want to validate or help improve."></textarea></label>
          <label class="field-wide"><span>Relevant experience</span><textarea name="experience_summary" required placeholder="Creator tooling, SaaS UX, QA, operations, automation, support, or technical familiarity."></textarea></label>
          <label class="field-wide"><span>Testing environment</span><textarea name="testing_environment" required placeholder="Browsers, platforms, network conditions, streaming setup, devices, or edge cases you can cover."></textarea></label>
          <label class="field-wide"><span>Product usage context</span><textarea name="product_usage" placeholder="Optional context about your current workflow or creator tooling exposure."></textarea></label>
          <section id="beta-apply-turnstile-panel" class="turnstile-panel field-wide" hidden aria-live="polite">
            <div id="beta-apply-turnstile" class="turnstile-slot"></div>
            <p id="beta-apply-turnstile-status" class="turnstile-status"></p>
          </section>
          <div class="field-wide"><button class="solid-button" type="submit">Submit application</button><div id="beta-apply-status" class="status-line"></div></div>
        </form>
      </article>
    </section>
  </main>
  <footer class="footer"><div class="shell footer-inner"><span>Beta application</span><span>© <span data-year></span> Brainstream Media Group</span></div></footer>
  <script type="module" src="/js/beta-apply.js"></script>
</body>
</html>
