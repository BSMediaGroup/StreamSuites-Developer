<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Auth Success | StreamSuites Developer Console</title>
  <link rel="icon" href="/assets/logos/favicon.ico" />
  <link rel="stylesheet" href="/css/app.css" />
</head>
<body>
  <header class="topbar">
    <div class="shell narrow topbar-inner">
      <a class="brand" href="/">
        <img src="/assets/logos/logocircle.png" alt="StreamSuites" />
        <div class="brand-copy">
          <span class="brand-mark">StreamSuites</span>
          <span class="brand-sub">Developer Console</span>
        </div>
      </a>
      <div class="standalone-actions">
        <a class="header-link" href="/dashboard/">Back to dashboard</a>
        <span data-auth-slot></span>
      </div>
    </div>
  </header>
  <main class="shell narrow page-shell">
    <section class="main-stack">
      <article class="hero-card">
        <span class="eyebrow"><strong>Authentication</strong> success handoff</span>
        <h1>Signed in</h1>
        <p class="muted">Finalising your StreamSuites session and returning you to the requested console route.</p>
        <div id="auth-success-status" class="status-line">Finalising session...</div>
        <div class="hero-actions"><a id="success-next-link" class="ghost-button" href="/dashboard/">Continue now</a></div>
      </article>
    </section>
  </main>
  <script type="module">
    import { initStandalonePage } from "/js/auth.js";
    await initStandalonePage({ navKey: "login-success" });
  </script>
  <script type="module" src="/js/auth-success.js"></script>
</body>
</html>
